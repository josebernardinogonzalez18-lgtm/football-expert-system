name: AI Football Expert Autonomous & Deep Learning

on:
  schedule:
    - cron: '0 23 * * *' 
  workflow_dispatch:

jobs:
  predict-learn-evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests numpy scipy pandas

      - name: Execute Full Autonomous Cycle
        env:
          ALLSPORTS_API_KEY: ${{ secrets.ALLSPORTS_API_KEY }}
        run: python3 main_automation.py

      - name: Persist Evolution
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub AI Optimizer"
          git add football_data.db daily_report.json model_params.json
          git commit -m "Daily Evolution: Deep Learning & Predictions [Autonomous]" || exit 0
          git push
