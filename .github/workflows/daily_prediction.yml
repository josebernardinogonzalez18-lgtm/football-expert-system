name: AI Football Expert Autonomous

on:
  schedule:
    - cron: '0 5 * * *' # Se ejecuta a las 5 AM UTC
  workflow_dispatch:

jobs:
  build-and-predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests numpy scipy pandas

      - name: Execute Oracle
        env:
          ALLSPORTS_API_KEY: ${{ secrets.ALLSPORTS_API_KEY }}
        run: python3 main_automation.py

      - name: Commit Updated DB and Report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Oracle"
          git add football_data.db daily_report.json
          git commit -m "Daily Auto-Update: $(date +'%Y-%m-%d')" || exit 0
          git push
