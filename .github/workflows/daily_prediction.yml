name: AI Football Expert Autonomous & Learning

on:
  schedule:
    - cron: '0 23 * * *' # Se ejecuta al final del día (11 PM UTC)
  workflow_dispatch:

jobs:
  predict-and-learn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests numpy scipy pandas

      - name: Step 1: Execute Daily Predictions
        env:
          ALLSPORTS_API_KEY: ${{ secrets.ALLSPORTS_API_KEY }}
        run: python3 main_automation.py

      - name: Step 2: Self-Learning and Model Tuning
        run: python3 learning_engine.py

      - name: Step 3: Persistence
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub AI Optimizer"
          git add football_data.db daily_report.json model_params.json || exit 0
          git commit -m "Daily Analytics & Self-Learning Update [Autonomous]" || exit 0
          git push
