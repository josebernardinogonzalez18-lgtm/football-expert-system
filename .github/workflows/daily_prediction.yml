name: Daily Football Prediction

on:
  schedule:
    - cron: '0 0 * * *' # Ejecutar a las 00:00 UTC cada día
  workflow_dispatch: # Permite ejecución manual

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests numpy scipy pandas

      - name: Run Daily Analysis
        env:
          API_KEY: ${{ secrets.ALLSPORTS_API_KEY }}
        run: |
          python3 predict_tool.py
